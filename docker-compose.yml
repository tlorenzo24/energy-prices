# Local/production stack: TimescaleDB + ingestion-scheduler worker + Streamlit dashboard.
# For zero-setup local dev you can skip this entirely and run on SQLite (see README).
services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-energy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env — no default, pick a strong one}
      POSTGRES_DB: ${POSTGRES_DB:-energy}
    # Bind to loopback only: the DB is never exposed on the LAN. Colleagues reach
    # the dashboard over the VPN (Tailscale), not the raw Postgres port.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-energy}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ingest:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["python", "-m", "energy_prices.ingestion.scheduler"]
    env_file: .env
    environment:
      ENERGY_DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-energy}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env — no default, pick a strong one}@db:5432/${POSTGRES_DB:-energy}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["python", "-m", "streamlit", "run", "src/energy_prices/dashboard/app.py",
              "--server.port", "8501", "--server.address", "0.0.0.0"]
    env_file: .env
    environment:
      ENERGY_DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-energy}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env — no default, pick a strong one}@db:5432/${POSTGRES_DB:-energy}
    # Bind to loopback on the host: reach it over the VPN (Tailscale) interface,
    # not the raw LAN. The container still listens on 0.0.0.0 internally; the
    # ENERGY_DASHBOARD_PASSWORD gate in .env adds a shared-secret check. To expose
    # on a specific VPN IP instead, change to "<tailscale-ip>:8501:8501".
    ports:
      - "127.0.0.1:8501:8501"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
