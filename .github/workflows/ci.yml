name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: ruff + mypy + pytest (SQLite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev,postgres]"
      - name: Ruff
        run: ruff check src tests scripts
      - name: Mypy
        run: mypy src
      - name: Pytest
        run: pytest -q

  postgres-timescale:
    name: Timescale hypertable + Postgres upsert
    runs-on: ubuntu-latest
    services:
      timescale:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: energy
          POSTGRES_PASSWORD: energy
          POSTGRES_DB: energy
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U energy"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      # Exercised by tests/test_postgres_timescale.py — validates the composite-PK
      # / hypertable fix against a real TimescaleDB (can't be checked on SQLite).
      ENERGY_DATABASE_URL: postgresql+psycopg2://energy:energy@localhost:5432/energy
      # Makes the Postgres URL guard test FAIL (not skip) here, so this job cannot
      # go green having silently skipped everything (service down / URL mistyped).
      ENERGY_REQUIRE_PG: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev,postgres]"
      - name: Wait for Timescale
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -p 5432 -U energy && exit 0
            sleep 2
          done
          echo "Timescale never became ready" >&2; exit 1
      - name: Postgres / Timescale tests
        run: pytest tests/test_postgres_timescale.py -q
